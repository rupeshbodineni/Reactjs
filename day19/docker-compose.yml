version: '3.9'
services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
      - ./backend/static/uploads:/app/static/uploads
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=sqlite:///./backend.db
      - SECRET_KEY=supersecretkey
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
